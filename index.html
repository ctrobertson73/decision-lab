<style>
  :root{
    --green:#1B6B5A;
    --green-deep:#0E3D33;
    --green-ink:#07221C;
    --green-mid:#124A3E;
    --green-line:rgba(212,168,75,.22);
    --gold:#D4A84B;
    --gold-soft:#E8C77A;
    --gold-deep:#8A6D20;
    --bg:#FAFAF8;
    --paper:#F3F1EA;
    --ink:#0B1410;
    --text:#1a2420;
    --muted:#6b6b6b;
    --line:rgba(11,20,16,.09);
    --line-strong:rgba(11,20,16,.16);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.55;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--gold);color:var(--green-ink)}

  /* dashboard grid backdrop, subtle */
  .grid-bg{
    position:absolute;inset:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(212,168,75,.06) 1px,transparent 1px),
      linear-gradient(90deg,rgba(212,168,75,.06) 1px,transparent 1px);
    background-size:64px 64px;
    mask-image:radial-gradient(ellipse at 50% 30%,black 40%,transparent 80%);
  }
  .grid-bg.tight{background-size:32px 32px}

  /* app chrome */
  .app{min-height:100vh;display:flex;flex-direction:column}
  .topbar{
    position:sticky;top:0;z-index:50;
    background:rgba(14,61,51,.94);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(212,168,75,.18);
    color:#F3F1EA;
  }
  .topbar-inner{max-width:1280px;margin:0 auto;padding:.75rem 1.5rem;display:flex;align-items:center;gap:1.25rem}
  .brand{display:flex;align-items:center;gap:.65rem;cursor:pointer;user-select:none}
  .brand-mark{
    width:30px;height:30px;position:relative;flex-shrink:0;
  }
  .brand-mark svg{display:block}
  .brand-text{font-family:'Source Serif 4',serif;font-weight:600;font-size:.98rem;letter-spacing:.01em;line-height:1.1}
  .brand-text small{display:block;font-family:'JetBrains Mono',monospace;font-size:.58rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);opacity:.9;margin-top:1px}

  .nav{display:flex;gap:.15rem;margin-left:auto;flex-wrap:wrap;justify-content:flex-end}
  .nav button{
    background:transparent;border:0;color:rgba(243,241,234,.62);
    font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;
    padding:.45rem .7rem;border-radius:6px;cursor:pointer;
    letter-spacing:.02em;transition:all .15s;white-space:nowrap;
    position:relative;
  }
  .nav button:hover{color:#fff;background:rgba(255,255,255,.05)}
  .nav button.active{color:var(--gold);background:rgba(212,168,75,.1)}
  .nav button.active::after{
    content:'';position:absolute;left:.7rem;right:.7rem;bottom:.2rem;
    height:1px;background:var(--gold);
  }
  .nav .sep{width:1px;background:rgba(243,241,234,.14);margin:.3rem .35rem}

  .nav-code{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.08em}

  /* pages */
  .page{animation:pageIn .35s ease both}
  @keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* general type */
  h1,h2,h3,h4{font-family:'Source Serif 4',serif;color:var(--ink);letter-spacing:-.01em}
  .mono{font-family:'JetBrains Mono',monospace;font-feature-settings:"ss01","ss02"}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.24em;
    text-transform:uppercase;color:var(--gold-deep);font-weight:600;
  }
  .eyebrow-dark{color:var(--gold)}

  /* containers */
  .wrap{max-width:1280px;margin:0 auto;padding:0 1.5rem}
  .wrap-narrow{max-width:980px;margin:0 auto;padding:0 1.5rem}

  /* buttons */
  .btn{
    display:inline-flex;align-items:center;gap:.5rem;
    padding:.65rem 1rem;border-radius:6px;
    font-family:'DM Sans',sans-serif;font-weight:600;font-size:.82rem;
    letter-spacing:.01em;cursor:pointer;border:0;transition:all .15s;
    white-space:nowrap;
  }
  .btn-primary{background:var(--gold);color:var(--green-ink)}
  .btn-primary:hover{background:var(--gold-soft);transform:translateY(-1px)}
  .btn-ghost{background:transparent;color:rgba(243,241,234,.88);border:1px solid rgba(243,241,234,.2)}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
  .btn-arrow::after{content:'→';font-family:'DM Sans',sans-serif}

  /* footer */
  .foot{
    background:var(--green-ink);color:rgba(243,241,234,.55);
    padding:2.5rem 0 3rem;margin-top:5rem;
    border-top:1px solid rgba(212,168,75,.2);
    font-size:.78rem;
  }
  .foot-inner{max-width:1280px;margin:0 auto;padding:0 1.5rem;display:flex;flex-wrap:wrap;gap:2rem;justify-content:space-between;align-items:flex-start}
  .foot a:hover{color:var(--gold)}
  .foot .mono{color:var(--gold);letter-spacing:.2em;font-size:.65rem}

  /* scrollbar */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:rgba(14,61,51,.25);border-radius:10px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:rgba(14,61,51,.45)}

  /* tweaks */
  .tweaks{
    position:fixed;right:1rem;bottom:1rem;z-index:80;
    background:var(--green-ink);color:#F3F1EA;
    border:1px solid rgba(212,168,75,.3);border-radius:10px;
    padding:.9rem 1rem;min-width:220px;
    box-shadow:0 16px 40px rgba(0,0,0,.35);
    font-size:.75rem;
  }
  .tweaks-title{font-family:'JetBrains Mono',monospace;letter-spacing:.18em;font-size:.6rem;color:var(--gold);margin-bottom:.6rem;text-transform:uppercase}
  .tweak-row{display:flex;justify-content:space-between;align-items:center;gap:.75rem;padding:.3rem 0}
  .tweak-row label{opacity:.75}
  .tweak-row .chips{display:flex;gap:.2rem}
  .tweak-row .chips button{
    background:rgba(255,255,255,.06);color:rgba(243,241,234,.8);
    border:1px solid transparent;font-family:'JetBrains Mono',monospace;font-size:.62rem;
    padding:.25rem .45rem;border-radius:4px;cursor:pointer;letter-spacing:.08em;
  }
  .tweak-row .chips button.on{background:var(--gold);color:var(--green-ink);border-color:var(--gold)}

  @media(max-width:760px){
    .topbar-inner{flex-wrap:wrap;gap:.75rem}
    .nav{width:100%;justify-content:flex-start;overflow-x:auto}
    .nav .sep{display:none}
  }
</style>
</head>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">

// ======== src/shared.jsx ========
(function(){
// Shared UI primitives

const TIER_COLORS = {
  found: '#3A9E8A',
  accel: '#D4A84B',
  clin:  '#C66B45',
  cap:   '#1B6B5A',
};

// Brand mark — concentric diamond referencing Decision Cycle
const BrandMark = ({size=30}) => (
  <svg width={size} height={size} viewBox="0 0 30 30" fill="none">
    <rect x="3.5" y="3.5" width="23" height="23" rx="2"
      transform="rotate(45 15 15)" stroke="#D4A84B" strokeWidth="1.2"/>
    <rect x="9" y="9" width="12" height="12" rx="1"
      transform="rotate(45 15 15)" stroke="#D4A84B" strokeWidth="1.2" opacity=".55"/>
    <circle cx="15" cy="4" r="1.6" fill="#D4A84B"/>
    <circle cx="26" cy="15" r="1.6" fill="#D4A84B"/>
    <circle cx="15" cy="26" r="1.6" fill="#D4A84B"/>
    <circle cx="4" cy="15" r="1.6" fill="#D4A84B"/>
    <circle cx="15" cy="15" r="2" fill="#D4A84B"/>
  </svg>
);

// Monospace label / code chip
const Tag = ({children, tone='neutral', style}) => {
  const tones = {
    neutral: {bg:'rgba(11,20,16,.06)', fg:'#0B1410'},
    gold:    {bg:'rgba(212,168,75,.15)', fg:'#8A6D20'},
    green:   {bg:'rgba(27,107,90,.12)', fg:'#124A3E'},
    ondark:  {bg:'rgba(212,168,75,.15)', fg:'#E8C77A'},
  };
  const t = tones[tone] || tones.neutral;
  return (
    <span style={{
      fontFamily:'JetBrains Mono,monospace', fontSize:'.62rem', fontWeight:600,
      letterSpacing:'.14em', textTransform:'uppercase',
      padding:'.25rem .55rem', borderRadius:'3px',
      background:t.bg, color:t.fg, display:'inline-block', whiteSpace:'nowrap',
      ...style,
    }}>{children}</span>
  );
};

// Section label with rule lines
const SectionLabel = ({children, dark}) => (
  <div style={{
    display:'flex', alignItems:'center', gap:'1rem',
    margin:'3rem 0 1.5rem',
  }}>
    <span style={{flex:1, height:1, background: dark? 'rgba(212,168,75,.25)' : 'rgba(11,20,16,.12)'}}/>
    <span style={{
      fontFamily:'JetBrains Mono,monospace', fontSize:'.66rem',
      letterSpacing:'.24em', textTransform:'uppercase', fontWeight:600,
      color: dark? '#D4A84B' : '#8A6D20',
    }}>{children}</span>
    <span style={{flex:1, height:1, background: dark? 'rgba(212,168,75,.25)' : 'rgba(11,20,16,.12)'}}/>
  </div>
);

// ---------------- PIPELINE SPINE ----------------
// A horizontal reading of the six-course journey. Nodes sit on a spine.
// Tiers are color-grouped underneath as grouping brackets.
const PipelineSpine = ({active, onPick, compact}) => {
  const courses = window.COURSES;
  const tiers = window.TIERS;

  // Group courses by tier maintaining position order
  const tierGroups = tiers.map(t => ({
    ...t,
    courses: courses.filter(c => c.tier === t.id).sort((a,b)=>a.position-b.position),
  })).filter(g => g.courses.length > 0);

  return (
    <div style={{position:'relative', padding: compact ? '1rem 0 1.75rem' : '2rem 0 2.5rem'}}>
      {/* tier brackets */}
      <div style={{
        display:'grid',
        gridTemplateColumns: `repeat(${courses.length}, 1fr)`,
        marginBottom: compact? '.9rem' : '1.25rem',
        columnGap:0,
      }}>
        {tierGroups.map((g,gi) => (
          <div key={g.id} style={{
            gridColumn: `span ${g.courses.length}`,
            display:'flex', flexDirection:'column', alignItems:'center',
            paddingBottom:'.4rem',
            borderBottom:'1px solid rgba(212,168,75,.28)',
            position:'relative',
          }}>
            <div style={{
              fontFamily:'JetBrains Mono,monospace',
              fontSize:'.6rem', letterSpacing:'.22em',
              textTransform:'uppercase', fontWeight:600,
              color:'rgba(243,241,234,.55)',
            }}>
              {String(gi+1).padStart(2,'0')} · Tier · {g.label}
            </div>
          </div>
        ))}
      </div>

      {/* spine + nodes */}
      <div style={{
        position:'relative',
        display:'grid',
        gridTemplateColumns: `repeat(${courses.length}, 1fr)`,
        alignItems:'start',
        paddingTop:'1.5rem',
      }}>
        {/* the spine line runs behind the nodes */}
        <div style={{
          position:'absolute', left:'5%', right:'5%', top:'1.5rem',
          height:2, background:'linear-gradient(90deg, rgba(212,168,75,.15), rgba(212,168,75,.75) 50%, rgba(212,168,75,.15))',
        }}/>
        {courses.map((c,i) => {
          const isActive = active === c.id;
          return (
            <div key={c.id} style={{position:'relative', textAlign:'center'}}>
              {/* node */}
              <button
                onClick={()=>onPick && onPick(c.id)}
                style={{
                  position:'relative', zIndex:2,
                  width: compact? 46 : 54, height: compact? 46 : 54,
                  borderRadius:'999px',
                  border:`2px solid ${isActive? '#D4A84B' : 'rgba(212,168,75,.4)'}`,
                  background: isActive? '#D4A84B' : '#0E3D33',
                  color: isActive? '#0E3D33' : '#F3F1EA',
                  fontFamily:'JetBrains Mono,monospace',
                  fontSize: compact? '.72rem' : '.78rem',
                  fontWeight:700, letterSpacing:'.04em',
                  cursor:'pointer', transition:'all .2s',
                  boxShadow: isActive? '0 0 0 6px rgba(212,168,75,.15)' : 'none',
                }}
                onMouseEnter={e=>{if(!isActive){e.currentTarget.style.borderColor='#D4A84B';e.currentTarget.style.transform='translateY(-2px)'}}}

// ---------------- DECISION CYCLE PENTAGON ----------------
// Five-node graph matching the lab's banner: THEORIZE↔JUSTIFY paired at top,
// QUERY (left) and DECIDE (right) on the sides, INTERPRET at the bottom.
// THEORIZE and JUSTIFY are highlighted as the AI-resistant ends of the cycle.
const DecisionDiamond = ({active, onHover, size=360, dark=false}) => {
  const cycle = window.DECISION_CYCLE;
  const cx = size/2, cy = size/2;
  const rOuter = size * 0.36;
  const topPair = size * 0.13; // horizontal half-distance between the top pair
  const topY = cy - rOuter * 0.85;
  const sideY = cy + rOuter * 0.05;
  const bottomY = cy + rOuter * 0.85;

  // Order: theorize, query, interpret, decide, justify
  const positions = [
    {x: cx - topPair,        y: topY},     // THEORIZE (top-left)
    {x: cx - rOuter * 1.05,  y: sideY},    // QUERY    (left)
    {x: cx,                  y: bottomY},  // INTERPRET (bottom)
    {x: cx + rOuter * 1.05,  y: sideY},    // DECIDE   (right)
    {x: cx + topPair,        y: topY},     // JUSTIFY  (top-right)
  ];

  const stroke = dark? 'rgba(212,168,75,.4)' : 'rgba(212,168,75,.6)';
  const strokeFaint = dark? 'rgba(212,168,75,.18)' : 'rgba(212,168,75,.3)';
  const text   = dark? '#F3F1EA' : '#0B1410';
  const sub    = dark? 'rgba(243,241,234,.55)' : '#6b6b6b';
  const nodeFill = dark? '#0E3D33' : '#FAFAF8';
  const aiResistFill = dark? '#0E3D33' : '#FFF8E5'; // subtle gold tint for AI-resistant nodes
  const hotFill  = '#D4A84B';
  const center = {x: cx, y: cy + rOuter * 0.1};

  // Cycle edges (perimeter)
  const cycleEdges = [
    [0,1], // theorize -> query
    [1,2], // query -> interpret
    [2,3], // interpret -> decide
    [3,4], // decide -> justify
  ];

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block', overflow:'visible'}}>
      <defs>
        <radialGradient id="dd-glow" cx="50%" cy="55%">
          <stop offset="0%" stopColor="#D4A84B" stopOpacity=".15"/>
          <stop offset="70%" stopColor="#D4A84B" stopOpacity="0"/>
        </radialGradient>
        <marker id="dd-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M0,0 L10,5 L0,10 z" fill={hotFill}/>
        </marker>
        <marker id="dd-arrow-rev" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M10,0 L0,5 L10,10 z" fill={hotFill}/>
        </marker>
      </defs>

      <rect x="0" y="0" width={size} height={size} fill="url(#dd-glow)"/>

      {/* spokes from center to each node — faint, structural */}
      {positions.map((p,i)=>(
        <line key={`spoke-${i}`} x1={center.x} y1={center.y} x2={p.x} y2={p.y}
          stroke={strokeFaint} strokeWidth="1"/>
      ))}

      {/* cycle perimeter edges */}
      {cycleEdges.map(([a,b],i)=>(
        <line key={`edge-${i}`}
          x1={positions[a].x} y1={positions[a].y}
          x2={positions[b].x} y2={positions[b].y}
          stroke={stroke} strokeWidth="1.6"/>
      ))}

      {/* THEORIZE ↔ JUSTIFY: the AI-resistant tension at the top — bidirectional */}
      <line
        x1={positions[0].x + 30} y1={positions[0].y}
        x2={positions[4].x - 30} y2={positions[4].y}
        stroke={hotFill} strokeWidth="1.8"
        markerStart="url(#dd-arrow-rev)"
        markerEnd="url(#dd-arrow)"/>

      {/* center node */}
      <circle cx={center.x} cy={center.y} r="6" fill={hotFill}/>
      <circle cx={center.x} cy={center.y} r="6" fill="none" stroke={hotFill} strokeOpacity=".4" strokeWidth="1">
        <animate attributeName="r" from="6" to="24" dur="2.6s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" from=".5" to="0" dur="2.6s" repeatCount="indefinite"/>
      </circle>

      {/* nodes */}
      {cycle.map((c,i) => {
        const p = positions[i];
        const on = active === c.id;
        const aiR = c.aiResist;
        const nr = aiR ? 38 : 34;
        return (
          <g key={c.id}
             onMouseEnter={()=> onHover && onHover(c.id)}
             onMouseLeave={()=> onHover && onHover(null)}
             style={{cursor: onHover? 'pointer' : 'default'}}>
            {/* AI-resistant ring */}
            {aiR && (
              <circle cx={p.x} cy={p.y} r={nr+5}
                fill="none" stroke={hotFill}
                strokeWidth="1" strokeOpacity={on? .9 : .35}
                strokeDasharray="3 3"/>
            )}
            <circle cx={p.x} cy={p.y} r={nr}
              fill={on? hotFill : (aiR? aiResistFill : nodeFill)}
              stroke={on? hotFill : stroke}
              strokeWidth={on? 2 : 1.5}/>
            <text x={p.x} y={p.y - 2}
              textAnchor="middle" dominantBaseline="middle"
              fontFamily="JetBrains Mono,monospace"
              fontSize={nr >= 38 ? "10" : "9.5"} fontWeight="700" letterSpacing=".08em"
              fill={on? '#0E3D33' : text}>{c.label}</text>
            <text x={p.x} y={p.y + 11}
              textAnchor="middle" dominantBaseline="middle"
              fontFamily="DM Sans,sans-serif"
              fontSize="8" fontWeight="500"
              fill={on? 'rgba(14,61,51,.75)' : sub}>
              {'0' + (i+1)}
            </text>
          </g>
        );
      })}
    </svg>
  );
};

// Telemetry strip — a fake live indicator. Purely decorative for the operations feel.
const TelemetryStrip = () => {
  const [t, setT] = React.useState(0);

    const id = setInterval(() => setT(x => x+1), 1000);
    return () => clearInterval(id);
  }, []);
  const tick = (i) => {

    const v = Math.sin((t + i*13) * 0.7) * 0.5 + 0.5;
    return 12 + v * 20;
  };
  return (
    <div style={{
      display:'flex', alignItems:'flex-end', gap:3, height:32,
      padding:'0 .5rem',
    }}>
      {Array.from({length:24}).map((_,i)=>(
        <div key={i} style={{
          width:3, height: `${tick(i)}px`,
          background: i % 4 === 0 ? '#D4A84B' : 'rgba(212,168,75,.35)',
          borderRadius:1, transition:'height .7s ease',
        }}/>
      ))}
    </div>
  );
};

      {/* ============================================================ */}
      {/* SECTION 01                                                   */}
      {/* ============================================================ */}
      <section className="brief-section" id="brief-what">
        <div className="brief-wrap-narrow">
          <SectionHead n="01" label="What the Lab is"/>

          <p className="brief-lead">
            It addresses a problem sport science employers have named directly: health and exercise
            sciences graduates enter the workforce able to perform technical analyses but unable to
            close the gap between analytical output and confident, defensible recommendations. Call
            it the <strong>data–decision gap</strong>. The Decision Lab exists to close it.
          </p>

          <p className="brief-body">
            The Sport Science Decision Lab is an operational framework for training professional
            judgment in sport and health science contexts. It replaces traditional lecture-and-exam
            architecture with a competency-based practice: students develop live decision-making under
            questioning, with AI as a labor partner and student-owned reasoning as the non-negotiable
            standard.
          </p>

          <p className="brief-body">
            The Lab runs as a six-course integrated pipeline spanning <CourseRef code="HLSC 205" onNav={onNav} id="hlsc-205"/> (Statistics for Health
            and Exercise Science), <CourseRef code="EXSC 325" onNav={onNav} id="exsc-325"/> (Motor Control), <CourseRef code="EXSC 442" onNav={onNav} id="exsc-442"/> (Advanced Statistics), <CourseRef code="EXSC 405" onNav={onNav} id="exsc-405"/> (Clinical
            Neuroanatomy), <CourseRef code="HLSC 499" onNav={onNav} id="hlsc-499"/> (Senior Thesis), and <CourseRef code="HLSC 490" onNav={onNav} id="hlsc-490"/> (Sport Science Practicum). Students
            encounter the same database, the same reasoning framework, and the same professional role
            structure across every course. Only the stakes change as they progress from simulated
            classroom data to applied research to supervised professional placement.
          </p>
        </div>
      </section>

      <PullQuote
        text="AI as a labor partner. Student-owned reasoning as the non-negotiable standard."
        attr="Core stance"
      />

      {/* ============================================================ */}
      {/* SECTION 02                                                   */}
      {/* ============================================================ */}
      <section className="brief-section" id="brief-teaches">
        <div className="brief-wrap-narrow">
          <SectionHead n="02" label="What the Lab teaches"/>

          <DefinitionRow term="Decision Intelligence" role="The overarching methodology">
            The capacity to close the gap between <em>having data</em> and <em>making decisions with it</em>.
            It is what the Lab is building.
          </DefinitionRow>

          <DefinitionRow term="The Decision Cycle" role="The operational framework — five phases" accent>
            <span className="brief-cycle-inline">
              <span style={{color:'#1B6B5A'}}>THEORIZE</span><span className="arr">→</span>
              <span>QUERY</span><span className="arr">→</span>
              <span>INTERPRET</span><span className="arr">→</span>
              <span>DECIDE</span><span className="arr">→</span>
              <span style={{color:'#1B6B5A'}}>JUSTIFY</span>
            </span>
            <div style={{marginTop:'.85rem'}}>
              Students <strong>theorize</strong> on two axes before evidence is in. They commit to a working
              model of how the system operates — the athlete, the program, the injury mechanism — and they
              commit to a model of <em>the stakeholder</em>: what counts as useful, what they will do with the
              answer, what tradeoff they can accept. They <em>query</em> the information that fits the model,
              <em> interpret</em> what it tells them and what it misses, and <em>decide</em> under uncertainty.
              They <strong>justify</strong> by naming both the purpose of their intervention and its trade-off,
              defending the recommendation under questioning.
            </div>
            <div style={{marginTop:'.85rem'}}>
              The cycle has two AI-resistant ends and three AI-assisted middle phases.
              <strong> THEORIZE</strong> is the competency AI cannot inherit — a model of the system and a
              model of the stakeholder are positions the student must own, not artifacts they can
              delegate. <strong>JUSTIFY</strong> is the competency that does not compress — defending a call
              to a veteran coach, a worried parent, or a stakeholder with a different answer. The middle
              three (QUERY, INTERPRET, DECIDE) are where AI now does most of the labor.
            </div>
          </DefinitionRow>

          <DefinitionRow term="Prepared, not planned" role="The operating stance">
            Practitioners cannot script the situations they will face. What they carry into any
            situation is a trained way of reading it — and a model they brought in before the data
            arrived.
          </DefinitionRow>

          <p className="brief-body" style={{marginTop:'2rem', marginBottom:'1.25rem'}}>
            Six professional role titles scaffold the progression across courses. Students inhabit
            recognizable professional identities rather than moving through content as passive learners.
          </p>

          <div className="brief-roles-table">
            <div className="brief-roles-row brief-roles-head">
              <div>Course</div>
              <div>Short label</div>
              <div>Full professional seat</div>
            </div>
            {(window.COURSES || []).slice().sort((a,b)=>a.position-b.position).map(c=>(
              <div className="brief-roles-row" key={c.id}>
                <div className="brief-roles-code">{c.code}</div>
                <div className="brief-roles-short">{c.role}</div>
                <div className="brief-roles-full">{c.roleFull || c.role}</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      <PullQuote
        text="The Lab treats judgment as the content."
        attr="What makes it distinctive"
        dark
      />

      {/* ============================================================ */}
      {/* SECTION 03 — transdisciplinary                              */}
      {/* ============================================================ */}
      <section className="brief-section" id="brief-transdisciplinary">
        <div className="brief-wrap-narrow">
          <SectionHead n="03" label="From multidisciplinary to transdisciplinary"/>

          <p className="brief-lead">
            The Lab is not a sequence of related courses. It is a single transdisciplinary architecture
            — one database, one Decision Cycle, one progression of professional roles — designed to
            produce a practitioner identity, not a transcript.
          </p>

          <div className="brief-trans-grid">
            {(window.TRANSDISCIPLINARY || []).map((t,i)=>(
              <div className={`brief-trans-card ${t.emphasis ? 'emphasis' : ''}`} key={t.mode}>
                <div className="brief-trans-num">{String(i+1).padStart(2,'0')}</div>
                <div className="brief-trans-mode">{t.mode}</div>
                <div className="brief-trans-sub">{t.sub}</div>
                <p className="brief-trans-body">{t.body}</p>
              </div>
            ))}
          </div>

          <p className="brief-body" style={{marginTop:'2rem'}}>
            Most undergraduate sport-science programs operate multidisciplinarily by default and gesture
            toward interdisciplinarity in capstones. The Decision Lab is engineered transdisciplinarily
            from the foundation up: the same database from week one of HLSC 205 through the practicum
            in HLSC 490, the same five-phase cycle in every assignment, the same six professional seats
            building toward an integrated practitioner identity at exit.
          </p>

          <p className="brief-body">
            The Decision Cycle is the integration mechanism. It is the one cognitive object every course
            shares — the connective tissue that makes the architecture transdisciplinary rather than
            merely sequenced.
          </p>
        </div>
      </section>

      {/* ============================================================ */}
      {/* SECTION 04                                                   */}
      {/* ============================================================ */}
      <section className="brief-section" id="brief-distinctive">
        <div className="brief-wrap-narrow">
          <SectionHead n="04" label="What makes the Lab distinctive"/>

          <p className="brief-lead">
            Most undergraduate sport and health science programs teach content and hope judgment
            emerges. The Lab treats judgment <em>as</em> the content.
          </p>

          <p className="brief-body">
            AI handles most of the analytical pipeline now. What it cannot handle is holding ground in
            front of a coach with decades of experience, or defending a return-to-play decision to a
            stakeholder who wants a different answer. That capacity — reasoning under pressure and
            communicating findings to people who disagree — is what the Lab trains.
          </p>

          <p className="brief-body">
            Graduate programs in sport analytics are still debating what the field actually is. The
            Decision Cycle is an operational definition, and undergraduates who can walk into a
            stakeholder conversation with it in their pocket arrive more prepared than most of their
            graduate-level peers.
          </p>

          <div className="brief-closing">
            <div className="brief-closing-eyebrow">The graduate outcome</div>
            <p>
              Students do not graduate having taken six courses. They graduate as <strong>transdisciplinary
              practitioners</strong> — able to commit to a mental model of both system and stakeholder,
              read situations, formulate genuine questions, reason under uncertainty, and defend their
              reasoning to someone who pushes back.
            </p>
          </div>
        </div>
      </section>

            border:none !important;
            background:transparent !important;
            page-break-inside:auto;

            border-color:#000 !important;
            page-break-after:avoid;
            break-after:avoid;
            page-break-inside:avoid;
            break-inside:avoid;
          }

          /* Block-level "keep together" rules for cohesive units */

            page-break-inside:avoid;

// ======== src/app.jsx ========
(function(){
// App shell — routing, nav, tweaks panel

const { Landing, CoursePage, AboutPage, BriefPage, BrandMark, SiteFooter } = window;

const ROUTES = new Set(['landing', 'about', 'brief', ...window.COURSES.map(c=>c.id)]);

const parseHash = () => {
  const h = (window.location.hash || '').replace(/^#\/?/, '');
  if (!h) return 'landing';
  return ROUTES.has(h) ? h : 'landing';
};

const TopBar = ({route, onNav}) => {
  const courses = window.COURSES;
  const active = route;
  return (
    <header className="topbar">
      <div className="topbar-inner">
        <div className="brand" onClick={()=>onNav('landing')}>
          <BrandMark size={30}/>
          <div className="brand-text">
            Decision Lab
            <small>Sport Science · JU</small>
          </div>
        </div>
        <nav className="nav">
          <button className={active==='landing'?'active':''} onClick={()=>onNav('landing')}>Overview</button>
          <span className="sep"/>
          {courses.map(c=>(
            <button key={c.id}
              className={(active===c.id?'active ':'') + 'nav-code'}
              onClick={()=>onNav(c.id)}
              title={`${c.code} · ${c.title}`}>
              {c.code.split(' ')[1]}
            </button>
          ))}
          <span className="sep"/>
          <button className={active==='brief'?'active':''} onClick={()=>onNav('brief')}>The Brief</button>
          <button className={active==='about'?'active':''} onClick={()=>onNav('about')}>About</button>
        </nav>
      </div>
    </header>
  );
};

const TweaksPanel = ({tweaks, setTweaks}) => {
  if (!tweaks._show) return null;
  const opts = [
    {k:'accent',      label:'Accent',     values:['gold','teal','crimson']},
    {k:'density',     label:'Density',    values:['comfortable','compact']},
    {k:'heroTelemetry', label:'Telemetry', values:[true, false], display:{true:'on', false:'off'}},
  ];
  const set = (k,v) => {
    const next = {...tweaks, [k]:v};
    setTweaks(next);
    const persisted = {...next};
    delete persisted._show;
    window.parent.postMessage({type:'__edit_mode_set_keys', edits: persisted}, '*');
  };
  return (
    <div className="tweaks">
      <div className="tweaks-title">◆ Tweaks</div>
      {opts.map(o=>(
        <div className="tweak-row" key={o.k}>
          <label>{o.label}</label>
          <div className="chips">
            {o.values.map(v=>(
              <button key={String(v)}
                className={tweaks[o.k]===v?'on':''}
                onClick={()=>set(o.k, v)}>
                {o.display?o.display[v]:String(v)}
              </button>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
};

const applyAccent = (accent) => {
  const palettes = {
    gold:    {gold:'#D4A84B', softer:'#E8C77A', deep:'#8A6D20'},
    teal:    {gold:'#5BB8A3', softer:'#86D4C1', deep:'#1B6B5A'},
    crimson: {gold:'#D06B5A', softer:'#E89A8C', deep:'#7A3527'},
  };
  const p = palettes[accent] || palettes.gold;
  document.documentElement.style.setProperty('--gold', p.gold);
  document.documentElement.style.setProperty('--gold-soft', p.softer);
  document.documentElement.style.setProperty('--gold-deep', p.deep);
};

const App = () => {
  const [route, setRoute] = React.useState(parseHash());
  const [tweaks, setTweaks] = React.useState({...window.__SSDL_TWEAKS, _show:false});

  // hash routing
  React.useEffect(() => {
    const handler = () => {
      setRoute(parseHash());
      window.scrollTo({top:0, behavior:'instant'});
    };
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  // apply accent
  React.useEffect(() => { applyAccent(tweaks.accent); }, [tweaks.accent]);

  // edit mode wiring
  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setTweaks(t => ({...t, _show:true}));
      if (d.type === '__deactivate_edit_mode') setTweaks(t => ({...t, _show:false}));
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const nav = (id) => {
    if (id === route) return;
    window.location.hash = '/' + id;
  };

  let page;
  if (route === 'landing') page = <Landing onNav={nav}/>;
  else if (route === 'about') page = <AboutPage onNav={nav}/>;
  else if (route === 'brief') page = <BriefPage onNav={nav}/>;
  else {
    const c = window.COURSES.find(x=>x.id===route);
    page = c ? <CoursePage course={c} onNav={nav}/> : <Landing onNav={nav}/>;
  }

  return (
    <div className="app" data-density={tweaks.density}>
      <TopBar route={route} onNav={nav}/>
      <main className="page in" key={route}>
        {page}
      </main>
      <SiteFooter onNav={nav}/>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

})();
